name: build

on:
    push:
        tags:
            - "v*.*.*"
permissions:
    contents: write
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore dependencies
              run: dotnet restore

            - name: Build
              run: |
                  dotnet build --no-restore -c release
                  VERSION=${GITHUB_REF_NAME}
                  cp "bin/Release/netstandard2.1/Silk Access.dll" "bin/Release/netstandard2.1/Silk-Access-$VERSION.dll"

            - name: Upload dll
              uses: softprops/action-gh-release@v2
              with:
                  files: "bin/Release/netstandard2.1/Silk-Access-${{ github.ref_name }}.dll"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

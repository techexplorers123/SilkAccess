name: Build

on:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name }}

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore dependencies
              run: dotnet restore

            - name: Build
              run: |
                  dotnet build --no-restore -c Release
                  VERSION=${{ github.event.release.tag_name }}
                  cp "bin/Release/netstandard2.1/Silk Access.dll" "bin/Release/netstandard2.1/Silk-Access-${VERSION}.dll"
            - name: Package release
              shell: bash
              run: |
                  VERSION=${{ github.event.release.tag_name }}
                  mkdir package
                  cp "bin/Release/netstandard2.1/Silk Access.dll" package/
                  cp README.md package/
                  # Optional
                  cp LICENSE package/
                  cd package
                  zip -r "../Silk-Access-${VERSION}.zip" .
            - name: Upload release assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: |
                      Silk-Access-${{ github.event.release.tag_name }}.zip